<html>
  <head>
    <title>Question 2</title>
    <script>
      function abc() {
        var a = document.getElementById("xyz");

        a.style.display = a.style.display == "none" ? "block" : "none";
      }
    </script>
  </head>
  <body>
    <p id="xyz">
      World is not all rainbow and sunshines. World will put you down but get up
      and walk towards it.
    </p>
    <input type="button" value="click" onclick="abc()" />
  </body>
</html>
